<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>React - Ejercicio 3</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .formulario-react {
      background-color: white; padding: 25px;
      border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    .formulario-react h2 { font-size: 18px; margin-bottom: 20px; color: #2c3e50; }
    .fila-campos { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
    .campo { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
    .campo label { font-size: 13px; color: #555; margin-bottom: 5px; }
    .campo input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
    .campo input:focus { border-color: #9b59b6; }
    .mensaje-error { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
    .imc-bajo      { color: #3498db; font-weight: bold; }
    .imc-normal    { color: #27ae60; font-weight: bold; }
    .imc-sobrepeso { color: #f39c12; font-weight: bold; }
    .imc-obesidad  { color: #e74c3c; font-weight: bold; }
    .titulo-tabla  { font-size: 18px; color: #2c3e50; margin-bottom: 12px; }
    .sin-datos     { text-align: center; color: #999; padding: 20px; background-color: white; border-radius: 6px; font-size: 14px; }
    .badge-react   { display: inline-block; background-color: #61dafb; color: #222; font-size: 12px; padding: 3px 10px; border-radius: 20px; margin-left: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>Ejercicio 3 - React <span class="badge-react">⚛️ React</span></h1>
    <p>El mismo formulario del ejercicio 2, hecho con componentes React</p>
  </header>
  <nav>
    <a href="index.html">← Inicio</a>
    <a href="flexbox.html">Flexbox</a>
    <a href="personas.html">Personas</a>
    <a href="react.html">React</a>
  </nav>
  <main>
    <div id="app"></div>
  </main>
  <footer><p>Actividad práctica - Desarrollo Web 2025</p></footer>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">

    function calcularIMC(peso, altura) {
      return Math.round((peso / (altura * altura)) * 10) / 10;
    }

    function categoriaIMC(imc) {
      if (imc < 18.5) return { texto: "Bajo peso",  clase: "imc-bajo" };
      if (imc < 25)   return { texto: "Normal",      clase: "imc-normal" };
      if (imc < 30)   return { texto: "Sobrepeso",   clase: "imc-sobrepeso" };
      return               { texto: "Obesidad",    clase: "imc-obesidad" };
    }

    function Formulario({ onAgregar }) {
      const [campos, setCampos] = React.useState({
        nombre: "", apellido: "", edad: "", altura: "", peso: ""
      });
      const [error, setError] = React.useState("");

      function handleChange(e) {
        setCampos({ ...campos, [e.target.name]: e.target.value });
      }

      function handleSubmit() {
        if (!campos.nombre || !campos.apellido || !campos.edad || !campos.altura || !campos.peso) {
          setError("Completá todos los campos.");
          return;
        }
        setError("");
        onAgregar({
          nombre:   campos.nombre.trim(),
          apellido: campos.apellido.trim(),
          edad:     parseInt(campos.edad),
          altura:   parseFloat(campos.altura),
          peso:     parseFloat(campos.peso)
        });
        setCampos({ nombre: "", apellido: "", edad: "", altura: "", peso: "" });
      }

      return (
        <div className="formulario-react">
          <h2>Agregar persona</h2>
          <div className="fila-campos">
            <div className="campo"><label>Nombre</label>  <input type="text"   name="nombre"   value={campos.nombre}   onChange={handleChange} placeholder="Ej: Juan" /></div>
            <div className="campo"><label>Apellido</label><input type="text"   name="apellido" value={campos.apellido} onChange={handleChange} placeholder="Ej: Pérez" /></div>
            <div className="campo"><label>Edad</label>    <input type="number" name="edad"     value={campos.edad}     onChange={handleChange} placeholder="Ej: 25" /></div>
            <div className="campo"><label>Altura (m)</label><input type="number" name="altura" value={campos.altura}   onChange={handleChange} placeholder="Ej: 1.75" step="0.01" /></div>
            <div className="campo"><label>Peso (kg)</label><input type="number" name="peso"   value={campos.peso}     onChange={handleChange} placeholder="Ej: 70" /></div>
          </div>
          {error && <p className="mensaje-error">{error}</p>}
          <button className="btn-primary" onClick={handleSubmit}>Agregar persona</button>
        </div>
      );
    }

    /* TablaPersonas y App se agregan en el próximo commit */

  </script>
</body>
</html>
